<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Registration Form</title>
    <link rel="stylesheet" href="s.css">
</head>
<body>
    <div class="container">
    <form class="form-box">
        <h2>Student Registration Form</h2>

        <div class="form-grid">

            <div class="input-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" required>
            </div>

            <div class="input-group">
                <label for="class">Class</label>
                <input type="text" id="class">
            </div>

            <div class="input-group">
                <label for="gender">Gender</label>
                <select id="gender">
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>

            <div class="input-group">
                <label for="age">Age</label>
                <input type="number" id="age">
            </div>

            <div class="input-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob">
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email">
            </div>

            <div class="input-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone">
            </div>

            <div class="input-group">
                <label for="address">Address</label>
                <input type="text" id="address">
            </div>

            <div class="input-group">
                <label for="city">City</label>
                <input type="text" id="city">
            </div>

            <div class="input-group">
                <label for="state">State</label>
                <input type="text" id="state">
            </div>

            <div class="input-group">
                <label for="country">Country</label>
                <input type="text" id="country">
            </div>

            <div class="input-group">
                <label for="guardian">Guardian Name</label>
                <input type="text" id="guardian">
            </div>

            <div class="input-group">
                <label for="guardian-phone">Guardian Phone</label>
                <input type="tel" id="guardian-phone">
            </div>

            <div class="input-group">
                <label for="school">Previous School</label>
                <input type="text" id="school">
            </div>

            <div class="input-group">
                <label for="nationality">Nationality</label>
                <input type="text" id="nationality">
            </div>

            <div class="input-group">
                <label for="religion">Religion</label>
                <input type="text" id="religion">
            </div>

            <div class="input-group">
                <label for="blood">Blood Group</label>
                <input type="text" id="blood">
            </div>

            <div class="input-group">
                <label for="hobby">Hobby</label>
                <input type="text" id="hobby">
            </div>

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password">
            </div>

        </div>

        <button type="submit">Register</button>

    </form>
</div>
</body>
</html>
